<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <!-- Marble back panel -->
  <rect x="10" y="10" width="480" height="330" rx="5" fill="url(#marbleBack)" stroke="#aaa" stroke-width="2.5"/>
  <!-- Marble veins -->
  <path d="M50,20 Q150,100 100,200 Q80,280 200,340" stroke="#ccc" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M300,15 Q350,120 380,200 Q400,280 450,340" stroke="#ccc" stroke-width="1.5" fill="none" opacity="0.35"/>
  <path d="M100,10 Q200,80 250,180 Q300,260 350,340" stroke="#ddd" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Three-panel dividers -->
  <line x1="170" y1="10" x2="170" y2="340" stroke="#bbb" stroke-width="1.5"/>
  <line x1="330" y1="10" x2="330" y2="340" stroke="#bbb" stroke-width="1.5"/>
  <!-- Decorative borders -->
  <rect x="10" y="10" width="480" height="330" rx="5" fill="none" stroke="#d4a017" stroke-width="2"/>
  <rect x="18" y="18" width="464" height="314" rx="4" fill="none" stroke="#d4a017" stroke-width="1" opacity="0.5"/>
  <!-- Center motif -->
  <circle cx="250" cy="175" r="50" fill="none" stroke="#ccc" stroke-width="1.5" opacity="0.4"/>
  <text x="250" y="190" text-anchor="middle" font-size="36" fill="#c0b090" font-family="serif" opacity="0.6">ॐ</text>
  <defs>
    <linearGradient id="marbleBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0ece0"/>
      <stop offset="50%" stop-color="#faf7f0"/>
      <stop offset="100%" stop-color="#e8e4d8"/>
    </linearGradient>
  </defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <!-- Hyper-compatible Remake: No filters, no radial gradients -->
  <rect x="0" y="0" width="500" height="350" fill="#fafafa" stroke="#dddddd" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" rx="3" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>

  <!-- Halo Aura (Using concentric circles instead of gradients for 100% safety) -->
  <circle cx="250" cy="165" r="140" fill="#fff8e1"/>
  <circle cx="250" cy="165" r="120" fill="#fffbeb"/>
  <circle cx="250" cy="165" r="100" fill="#ffffff"/>

  <!-- Golden Rings -->
  <circle cx="250" cy="165" r="110" fill="none" stroke="#d4af37" stroke-width="8" stroke-dasharray="10,4"/>
  <circle cx="250" cy="165" r="100" fill="none" stroke="#ffecb3" stroke-width="3"/>
  <circle cx="250" cy="165" r="95" fill="none" stroke="#b38728" stroke-width="4" stroke-dasharray="20,5"/>
  <circle cx="250" cy="165" r="88" fill="none" stroke="#f5f5f5" stroke-width="6"/>

  <!-- Dotted pattern -->
  <circle cx="250" cy="165" r="78" fill="none" stroke="#d4af37" stroke-width="2" stroke-dasharray="4,6"/>
  <circle cx="250" cy="165" r="68" fill="none" stroke="#d4af37" stroke-width="2" stroke-dasharray="4,8"/>

  <circle cx="250" cy="165" r="50" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
  <text x="250" y="180" text-anchor="middle" font-size="46" fill="#b38728" font-family="serif" font-weight="bold">ॐ</text>

  <!-- Left Standing Deepak -->
  <g transform="translate(100, 200)">
    <path d="M-15,60 L-25,90 L25,90 L15,60 Z" fill="#ffffff" stroke="#d4af37" stroke-width="2"/>
    <rect x="-10" y="30" width="20" height="30" fill="#ffffff" stroke="#d4af37" stroke-width="1.5"/>
    <path d="M-30,5 L30,5 Q30,20 0,20 Q-30,20 -30,5 Z" fill="#fffcf0" stroke="#b38728" stroke-width="1.5"/>
    <path d="M0,0 Q5,-10 0,-20 Q-5,-10 0,0" fill="#ffdb4d" stroke="#ff9900" stroke-width="1"/>
    <rect x="-35" y="90" width="70" height="6" rx="2" fill="#ffffff" stroke="#d4af37" stroke-width="1.5"/>
  </g>

  <!-- Right Standing Deepak -->
  <g transform="translate(400, 200)">
    <path d="M-15,60 L-25,90 L25,90 L15,60 Z" fill="#ffffff" stroke="#d4af37" stroke-width="2"/>
    <rect x="-10" y="30" width="20" height="30" fill="#ffffff" stroke="#d4af37" stroke-width="1.5"/>
    <path d="M-30,5 L30,5 Q30,20 0,20 Q-30,20 -30,5 Z" fill="#fffcf0" stroke="#b38728" stroke-width="1.5"/>
    <path d="M0,0 Q5,-10 0,-20 Q-5,-10 0,0" fill="#ffdb4d" stroke="#ff9900" stroke-width="1"/>
    <rect x="-35" y="90" width="70" height="6" rx="2" fill="#ffffff" stroke="#d4af37" stroke-width="1.5"/>
  </g>
</svg>

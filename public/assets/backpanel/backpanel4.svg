<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="wallGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>

    <radialGradient id="centerGlow4" cx="250" cy="175" r="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ffebb3" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fadd7d" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="goldCarving4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffdf8a"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#997a00"/>
    </linearGradient>

    <g id="mandalaPetal4">
      <path d="M 250 175 Q 260 130 250 85 Q 240 130 250 175 Z" fill="none" stroke="url(#goldCarving4)" stroke-width="2"/>
      <circle cx="250" cy="80" r="3" fill="url(#goldCarving4)"/>
    </g>
  </defs>

  <rect x="10" y="10" width="480" height="330" rx="3" fill="url(#wallGradient)" stroke="#e4e4e4" stroke-width="1.5"/>

  <!-- Golden Outer Frame Border -->
  <rect x="25" y="25" width="450" height="300" rx="8" fill="none" stroke="url(#goldCarving4)" stroke-width="4"/>
  <rect x="35" y="35" width="430" height="280" rx="4" fill="none" stroke="#d4af37" stroke-width="1.5"/>

  <!-- Corner decorative flourishes -->
  <path d="M 35 75 Q 55 55 75 35 M 35 55 Q 45 45 55 35" fill="none" stroke="url(#goldCarving4)" stroke-width="2"/>
  <circle cx="45" cy="45" r="4" fill="url(#goldCarving4)"/>
  <path d="M 465 75 Q 445 55 425 35 M 465 55 Q 455 45 445 35" fill="none" stroke="url(#goldCarving4)" stroke-width="2"/>
  <circle cx="455" cy="45" r="4" fill="url(#goldCarving4)"/>
  <path d="M 35 275 Q 55 295 75 315 M 35 295 Q 45 305 55 315" fill="none" stroke="url(#goldCarving4)" stroke-width="2"/>
  <circle cx="45" cy="305" r="4" fill="url(#goldCarving4)"/>
  <path d="M 465 275 Q 445 295 425 315 M 465 295 Q 455 305 445 315" fill="none" stroke="url(#goldCarving4)" stroke-width="2"/>
  <circle cx="455" cy="305" r="4" fill="url(#goldCarving4)"/>

  <!-- Center Backlight Glow -->
  <circle cx="250" cy="175" r="130" fill="url(#centerGlow4)"/>

  <!-- Intricate Circular Mandala Design -->
  <circle cx="250" cy="175" r="115" fill="none" stroke="url(#goldCarving4)" stroke-width="2" stroke-dasharray="6,4"/>
  <circle cx="250" cy="175" r="105" fill="none" stroke="#d4af37" stroke-width="1"/>
  
  <!-- Repeating Lotus Petals -->
  <g>
    <use href="#mandalaPetal4" />
    <use href="#mandalaPetal4" transform="rotate(22.5, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(45, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(67.5, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(90, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(112.5, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(135, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(157.5, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(180, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(202.5, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(225, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(247.5, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(270, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(292.5, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(315, 250, 175)"/>
    <use href="#mandalaPetal4" transform="rotate(337.5, 250, 175)"/>
  </g>

  <!-- Inner Rings -->
  <circle cx="250" cy="175" r="75" fill="none" stroke="url(#goldCarving4)" stroke-width="3"/>
  <circle cx="250" cy="175" r="65" fill="#ffffff" stroke="#d4af37" stroke-width="1.5"/>
  <circle cx="250" cy="175" r="55" fill="none" stroke="url(#goldCarving4)" stroke-width="2" stroke-dasharray="2,3"/>

  <!-- Central Element -->
  <path d="M 250 130 L 260 165 L 295 175 L 260 185 L 250 220 L 240 185 L 205 175 L 240 165 Z" fill="url(#goldCarving4)"/>
  <circle cx="250" cy="175" r="10" fill="#ffffff"/>
  <circle cx="250" cy="175" r="4" fill="url(#goldCarving4)"/>

</svg>

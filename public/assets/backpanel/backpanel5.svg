<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <!-- Plain back panel with floral pattern -->
  <rect x="10" y="10" width="480" height="330" rx="5" fill="url(#floralBack)" stroke="#999" stroke-width="2.5"/>
  <!-- Outer border -->
  <rect x="10" y="10" width="480" height="330" rx="5" fill="none" stroke="#c8a44a" stroke-width="2.5"/>
  <!-- Inner border -->
  <rect x="25" y="25" width="450" height="300" rx="4" fill="none" stroke="#c8a44a" stroke-width="1" opacity="0.6"/>
  <!-- Diagonal floral motifs -->
  <circle cx="100" cy="100" r="22" fill="#f5d06e" stroke="#c8a44a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="100" r="22" fill="#f5d06e" stroke="#c8a44a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="300" cy="100" r="22" fill="#f5d06e" stroke="#c8a44a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="400" cy="100" r="22" fill="#f5d06e" stroke="#c8a44a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="100" cy="175" r="22" fill="#f5d06e" stroke="#c8a44a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="175" r="22" fill="#f5d06e" stroke="#c8a44a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="300" cy="175" r="22" fill="#f5d06e" stroke="#c8a44a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="400" cy="175" r="22" fill="#f5d06e" stroke="#c8a44a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="100" cy="250" r="22" fill="#f5d06e" stroke="#c8a44a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="250" r="22" fill="#f5d06e" stroke="#c8a44a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="300" cy="250" r="22" fill="#f5d06e" stroke="#c8a44a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="400" cy="250" r="22" fill="#f5d06e" stroke="#c8a44a" stroke-width="1.5" opacity="0.5"/>
  <!-- Center large Om -->
  <text x="250" y="195" text-anchor="middle" font-size="52" fill="#c8a44a" font-family="serif" opacity="0.7">ॐ</text>
  <defs>
    <linearGradient id="floralBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff9f0"/>
      <stop offset="100%" stop-color="#f5eddd"/>
    </linearGradient>
  </defs>
</svg>

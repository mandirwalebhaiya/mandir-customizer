<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 280" width="80" height="280">
  <!-- Capital -->
  <polygon points="5,28 75,28 65,10 15,10" fill="#e8e0d0" stroke="#888" stroke-width="1.5"/>
  <rect x="10" y="8" width="60" height="6" rx="2" fill="#f5f0e8" stroke="#888" stroke-width="1"/>
  <!-- Shaft with marble look -->
  <rect x="20" y="28" width="40" height="200" fill="url(#marble)" stroke="#999" stroke-width="1.5"/>
  <!-- Marble veins -->
  <path d="M25,50 Q35,80 30,120 Q25,150 35,200" stroke="#ccc" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M45,40 Q55,90 50,140 Q45,170 55,220" stroke="#ccc" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Decorative band -->
  <rect x="18" y="120" width="44" height="8" rx="2" fill="#d4c9b8" stroke="#999" stroke-width="1"/>
  <!-- Base -->
  <rect x="12" y="228" width="56" height="18" rx="3" fill="#e0d8c8" stroke="#888" stroke-width="1.5"/>
  <polygon points="5,260 75,260 70,246 10,246" fill="#c8c0b0" stroke="#888" stroke-width="1.5"/>
  <defs>
    <linearGradient id="marble" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8d0c0"/>
      <stop offset="50%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#d0c8b8"/>
    </linearGradient>
  </defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 280" width="80" height="280">
  <!-- Crown -->
  <rect x="5" y="5" width="70" height="12" rx="3" fill="#d4a017" stroke="#a07010" stroke-width="1.5"/>
  <polygon points="5,17 15,5 25,17 35,5 45,17 55,5 65,17 75,5 75,17" fill="#e8b820" stroke="#a07010" stroke-width="1"/>
  <!-- Shaft - octagonal feel -->
  <polygon points="20,17 60,17 68,228 12,228" fill="url(#sandstone)" stroke="#a07010" stroke-width="1.5"/>
  <!-- Horizontal decorative bands -->
  <rect x="14" y="60" width="52" height="8" rx="2" fill="#d4a017" stroke="#a07010" stroke-width="1"/>
  <rect x="14" y="100" width="52" height="8" rx="2" fill="#d4a017" stroke="#a07010" stroke-width="1"/>
  <rect x="14" y="140" width="52" height="8" rx="2" fill="#d4a017" stroke="#a07010" stroke-width="1"/>
  <rect x="14" y="180" width="52" height="8" rx="2" fill="#d4a017" stroke="#a07010" stroke-width="1"/>
  <!-- Carved lotus -->
  <circle cx="40" cy="82" r="8" fill="#f5d06e" stroke="#a07010" stroke-width="1"/>
  <circle cx="40" cy="122" r="8" fill="#f5d06e" stroke="#a07010" stroke-width="1"/>
  <circle cx="40" cy="162" r="8" fill="#f5d06e" stroke="#a07010" stroke-width="1"/>
  <!-- Base -->
  <rect x="8" y="228" width="64" height="16" rx="4" fill="#d4a017" stroke="#a07010" stroke-width="1.5"/>
  <rect x="4" y="242" width="72" height="12" rx="3" fill="#a07010" stroke="#804000" stroke-width="1.5"/>
  <defs>
    <linearGradient id="sandstone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a800"/>
      <stop offset="40%" stop-color="#f0d070"/>
      <stop offset="100%" stop-color="#b08800"/>
    </linearGradient>
  </defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 280" width="80" height="280">
  <!-- Ionic capital with volutes -->
  <rect x="8" y="22" width="64" height="10" rx="2" fill="#f0ebe0" stroke="#bbb" stroke-width="1.5"/>
  <ellipse cx="20" cy="22" rx="10" ry="8" fill="none" stroke="#bbb" stroke-width="1.5"/>
  <ellipse cx="60" cy="22" rx="10" ry="8" fill="none" stroke="#bbb" stroke-width="1.5"/>
  <rect x="10" y="5" width="60" height="10" rx="3" fill="#e8e2d5" stroke="#bbb" stroke-width="1.5"/>
  <!-- Shaft  -->
  <rect x="22" y="32" width="36" height="196" rx="5" fill="url(#white_g)" stroke="#ccc" stroke-width="1.5"/>
  <!-- Fluting -->
  <line x1="29" y1="36" x2="29" y2="224" stroke="#ddd" stroke-width="1.5"/>
  <line x1="36" y1="36" x2="36" y2="224" stroke="#ddd" stroke-width="1.5"/>
  <line x1="43" y1="36" x2="43" y2="224" stroke="#ddd" stroke-width="1.5"/>
  <line x1="50" y1="36" x2="50" y2="224" stroke="#ddd" stroke-width="1.5"/>
  <!-- Gold ring accent -->
  <rect x="20" y="128" width="40" height="6" rx="2" fill="#d4a017" stroke="#a07010" stroke-width="1"/>
  <!-- Base -->
  <rect x="14" y="228" width="52" height="14" rx="3" fill="#e8e2d5" stroke="#bbb" stroke-width="1.5"/>
  <rect x="6" y="240" width="68" height="15" rx="4" fill="#d8d2c5" stroke="#bbb" stroke-width="1.5"/>
  <defs>
    <linearGradient id="white_g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8d2c5"/>
      <stop offset="50%" stop-color="#faf7f0"/>
      <stop offset="100%" stop-color="#d0cabb"/>
    </linearGradient>
  </defs>
</svg>

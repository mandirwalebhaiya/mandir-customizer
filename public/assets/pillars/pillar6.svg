<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 280" width="80" height="280">
  <defs>
    <linearGradient id="corianPillar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="20%" stop-color="#ffffff"/>
      <stop offset="80%" stop-color="#fdfdfd"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <linearGradient id="corianDetail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="50%" stop-color="#efefef"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </linearGradient>
  </defs>
  <!-- Base -->
  <rect x="10" y="250" width="60" height="20" rx="3" fill="url(#corianPillar)" stroke="#cccccc" stroke-width="1"/>
  <rect x="15" y="240" width="50" height="10" rx="2" fill="url(#corianDetail)" stroke="#cccccc" stroke-width="1"/>
  <!-- Shaft -->
  <rect x="25" y="30" width="30" height="210" rx="2" fill="url(#corianPillar)" stroke="#cccccc" stroke-width="1"/>
  <line x1="32" y1="30" x2="32" y2="240" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="40" y1="30" x2="40" y2="240" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="48" y1="30" x2="48" y2="240" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Intricate Corian Cutouts (Jali type pattern on shaft) -->
  <circle cx="40" cy="80" r="5" fill="#fcfcfc" stroke="#d0d0d0" stroke-width="1"/>
  <circle cx="40" cy="140" r="5" fill="#fcfcfc" stroke="#d0d0d0" stroke-width="1"/>
  <circle cx="40" cy="200" r="5" fill="#fcfcfc" stroke="#d0d0d0" stroke-width="1"/>
  <!-- Capital Element -->
  <rect x="15" y="20" width="50" height="10" rx="2" fill="url(#corianDetail)" stroke="#cccccc" stroke-width="1"/>
  <rect x="10" y="10" width="60" height="10" rx="3" fill="url(#corianPillar)" stroke="#cccccc" stroke-width="1"/>
  <!-- Decorative top arch -->
  <path d="M15,10 Q40,-5 65,10" fill="none" stroke="#cccccc" stroke-width="2"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="corianWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#eeeeee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="scale(1, 0.72) translate(0, 48)">
    <!-- Heavy Header Block -->
    <rect x="10" y="20" width="380" height="25" rx="2" fill="url(#corianWhite)" stroke="#cccccc" stroke-width="1"/>
    <rect x="5" y="45" width="390" height="10" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>

    <!-- Ornate Peacock Crest (Top Center) -->
    <g transform="translate(200, 25)" filter="url(#shadow)">
      <path d="M-40,0 Q-40,-35 0,-45 Q40,-35 40,0 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
      <path d="M-30,-5 Q-30,-25 0,-30 Q30,-25 30,-5 Z" fill="#fdfdfd" stroke="#dcdcdc" stroke-width="1"/>
      <path d="M-5,-30 Q0,-45 5,-30 Q0,-15 0,-5 Z" fill="#eeeeee" stroke="#cccccc" stroke-width="1"/>
      <circle cx="0" cy="-45" r="3" fill="#eeeeee" stroke="#cccccc" stroke-width="1"/>
      <path d="M-40,0 Q-50,-10 -45,-20 M40,0 Q50,-10 45,-20" stroke="#cccccc" stroke-width="1.5" fill="none"/>
    </g>

    <!-- Main Ornate Arch Shape -->
    <path d="M10,55 L390,55 L390,95 Q350,65 310,85 Q260,115 200,105 Q140,115 90,85 Q50,65 10,95 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" filter="url(#shadow)"/>
    <path d="M20,60 Q40,40 60,60 Q80,40 100,60 Q120,40 140,60 Q160,40 180,60 Q200,40 220,60 Q240,40 260,60 Q280,40 300,60 Q320,40 340,60 Q360,40 380,60" fill="none" stroke="#dcdcdc" stroke-width="1.5" opacity="0.6"/>
    
    <g transform="translate(60, 100)">
      <line x1="0" y1="-40" x2="0" y2="0" stroke="#cccccc" stroke-width="1" stroke-dasharray="2,2"/>
      <path d="M-8,15 Q0,5 8,15 L-8,15 Z" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
      <rect x="-8" y="15" width="16" height="8" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
    </g>
    <g transform="translate(340, 100)">
      <line x1="0" y1="-40" x2="0" y2="0" stroke="#cccccc" stroke-width="1" stroke-dasharray="2,2"/>
      <path d="M-8,15 Q0,5 8,15 L-8,15 Z" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
      <rect x="-8" y="15" width="16" height="8" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
    </g>
  </g>
</svg>

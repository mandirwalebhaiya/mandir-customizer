<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Multi-peak top (5 peaks) -->
  <!-- 5 shikharas -->
  <polygon points="200,4 230,70 170,70" fill="url(#peakMain)" stroke="#8b5e1a" stroke-width="1.5"/>
  <polygon points="130,20 155,70 105,70" fill="url(#peakSide)" stroke="#8b5e1a" stroke-width="1.5"/>
  <polygon points="270,20 295,70 245,70" fill="url(#peakSide)" stroke="#8b5e1a" stroke-width="1.5"/>
  <polygon points="60,35 85,70 35,70" fill="url(#peakSmall)" stroke="#8b5e1a" stroke-width="1.5"/>
  <polygon points="340,35 365,70 315,70" fill="url(#peakSmall)" stroke="#8b5e1a" stroke-width="1.5"/>
  <!-- Connecting base -->
  <rect x="15" y="68" width="370" height="14" rx="3" fill="#c8a44a" stroke="#8b5e1a" stroke-width="1.5"/>
  <rect x="10" y="80" width="380" height="12" rx="3" fill="#d4b055" stroke="#8b5e1a" stroke-width="1.5"/>
  <rect x="5" y="90" width="390" height="12" rx="3" fill="#b8941a" stroke="#8b5e1a" stroke-width="1.5"/>
  <rect x="2" y="100" width="396" height="14" rx="3" fill="#a07010" stroke="#8b5e1a" stroke-width="1.5"/>
  <!-- Kalash on peaks -->
  <circle cx="200" cy="4" r="4" fill="#f5d06e" stroke="#8b5e1a" stroke-width="1"/>
  <circle cx="130" cy="20" r="3" fill="#f5d06e" stroke="#8b5e1a" stroke-width="1"/>
  <circle cx="270" cy="20" r="3" fill="#f5d06e" stroke="#8b5e1a" stroke-width="1"/>
  <circle cx="60" cy="35" r="2.5" fill="#f5d06e" stroke="#8b5e1a" stroke-width="1"/>
  <circle cx="340" cy="35" r="2.5" fill="#f5d06e" stroke="#8b5e1a" stroke-width="1"/>
  <defs>
    <linearGradient id="peakMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d06e"/>
      <stop offset="100%" stop-color="#c8a44a"/>
    </linearGradient>
    <linearGradient id="peakSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c060"/>
      <stop offset="100%" stop-color="#b89038"/>
    </linearGradient>
    <linearGradient id="peakSmall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8b050"/>
      <stop offset="100%" stop-color="#a87828"/>
    </linearGradient>
  </defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="corianBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#fdfdfd"/>
      <stop offset="100%" stop-color="#eeeeee"/>
    </linearGradient>
    <linearGradient id="goldCarving" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9d976"/>
      <stop offset="50%" stop-color="#e2aa21"/>
      <stop offset="100%" stop-color="#bc8300"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="scale(1, 0.75) translate(0, 15)">
    <path d="M20,60 Q20,20 200,20 Q380,20 380,60 L380,120 L20,120 Z" fill="url(#corianBase)" stroke="#dcdcdc" stroke-width="1.5"/>
    <path d="M40,110 Q40,40 200,40 Q360,40 360,110" fill="none" stroke="url(#goldCarving)" stroke-width="4" stroke-dasharray="1,2"/>
    <path d="M55,110 Q55,55 200,55 Q345,55 345,110" fill="none" stroke="url(#goldCarving)" stroke-width="2"/>
    <path d="M70,110 Q70,70 200,70 Q330,70 330,110" fill="none" stroke="url(#goldCarving)" stroke-width="1" stroke-dasharray="10,5"/>

    <g transform="translate(45, 110)">
      <path d="M-10,0 Q-10,-30 10,-30 Q30,-30 30,0" fill="none" stroke="url(#goldCarving)" stroke-width="2"/>
      <circle cx="10" cy="-30" r="4" fill="url(#goldCarving)"/>
    </g>
    <g transform="translate(325, 110)">
      <path d="M10,0 Q10,-30 -10,-30 Q-30,-30 -30,0" fill="none" stroke="url(#goldCarving)" stroke-width="2"/>
      <circle cx="-10" cy="-30" r="4" fill="url(#goldCarving)"/>
    </g>

    <g transform="translate(200, 60)" filter="url(#glow)">
      <path d="M-20,0 Q0,-40 20,0 Q0,20 0,40 Q0,20 -20,0" fill="url(#goldCarving)"/>
      <circle cx="0" cy="-15" r="8" fill="#ffffff" stroke="url(#goldCarving)" stroke-width="2"/>
      <text x="0" y="-12" text-anchor="middle" font-size="10" fill="url(#goldCarving)" font-family="serif" font-weight="bold">ॐ</text>
    </g>
    <rect x="10" y="120" width="380" height="20" rx="2" fill="url(#corianBase)" stroke="#cccccc" stroke-width="1"/>
    <rect x="5" y="140" width="390" height="8" fill="#fafafa" stroke="#dcdcdc" stroke-width="1"/>
  </g>
</svg>

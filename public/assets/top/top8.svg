<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="whiteBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#fdfdfd"/>
      <stop offset="100%" stop-color="#eeeeee"/>
    </linearGradient>
    <linearGradient id="glowBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffae6"/>
      <stop offset="100%" stop-color="#fff5cc"/>
    </linearGradient>
    <radialGradient id="domeShade" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </radialGradient>
  </defs>

  <!-- Scaled to fit perfectly within 120 height without clipping -->
  <g transform="scale(1, 0.78) translate(0, 15)">
    <!-- Center Main Dome (Shikhara) -->
    <g transform="translate(200, 45)">
      <path d="M-25,10 Q0,-40 0,-40 Q0,-40 25,10 L35,60 L-35,60 Z" fill="url(#domeShade)" stroke="#cccccc" stroke-width="1"/>
      <path d="M-28,20 L28,20 M-32,35 L32,35 M-34,50 L34,50" stroke="#dcdcdc" stroke-width="1.5"/>
      <path d="M0,-40 L0,60 M-15,60 L-10,0 M15,60 L10,0" stroke="#dcdcdc" stroke-width="1"/>
      <circle cx="0" cy="-40" r="4" fill="#d4af37" stroke="#aa8000" stroke-width="1"/>
      <polygon points="-6,-40 0,-50 6,-40" fill="#d4af37" stroke="#aa8000" stroke-width="1"/>
    </g>

    <!-- Left Side Dome -->
    <g transform="translate(90, 55) scale(0.8)">
      <path d="M-25,10 Q0,-40 0,-40 Q0,-40 25,10 L35,60 L-35,60 Z" fill="url(#domeShade)" stroke="#cccccc" stroke-width="1"/>
      <path d="M-28,20 L28,20 M-32,35 L32,35 M-34,50 L34,50" stroke="#dcdcdc" stroke-width="1.5"/>
      <path d="M0,-40 L0,60 M-15,60 L-10,0 M15,60 L10,0" stroke="#dcdcdc" stroke-width="1"/>
      <circle cx="0" cy="-40" r="4" fill="#d4af37" stroke="#aa8000" stroke-width="1"/>
      <polygon points="-6,-40 0,-50 6,-40" fill="#d4af37" stroke="#aa8000" stroke-width="1"/>
    </g>

    <!-- Right Side Dome -->
    <g transform="translate(310, 55) scale(0.8)">
      <path d="M-25,10 Q0,-40 0,-40 Q0,-40 25,10 L35,60 L-35,60 Z" fill="url(#domeShade)" stroke="#cccccc" stroke-width="1"/>
      <path d="M-28,20 L28,20 M-32,35 L32,35 M-34,50 L34,50" stroke="#dcdcdc" stroke-width="1.5"/>
      <path d="M0,-40 L0,60 M-15,60 L-10,0 M15,60 L10,0" stroke="#dcdcdc" stroke-width="1"/>
      <circle cx="0" cy="-40" r="4" fill="#d4af37" stroke="#aa8000" stroke-width="1"/>
      <polygon points="-6,-40 0,-50 6,-40" fill="#d4af37" stroke="#aa8000" stroke-width="1"/>
    </g>

    <!-- Main Heavy Header Block -->
    <rect x="25" y="95" width="350" height="25" rx="2" fill="url(#whiteBase)" stroke="#cccccc" stroke-width="1.5"/>
    <rect x="15" y="120" width="370" height="10" rx="2" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5"/>
    <rect x="10" y="130" width="380" height="5" rx="1" fill="#f0f0f0" stroke="#cccccc" stroke-width="1.5"/>

    <!-- Left Jali Vent -->
    <rect x="35" y="100" width="105" height="15" fill="url(#glowBase)" stroke="#fadd7d" stroke-width="1"/>
    <path d="M40,100 L40,115 M50,100 L50,115 M60,100 L60,115 M70,100 L70,115 M80,100 L80,115 M90,100 L90,115 M100,100 L100,115 M110,100 L110,115 M120,100 L120,115 M130,100 L130,115" stroke="#ffffff" stroke-width="2"/>
    <path d="M35,105 L140,105 M35,110 L140,110" stroke="#ffffff" stroke-width="2"/>

    <!-- Right Jali Vent -->
    <rect x="260" y="100" width="105" height="15" fill="url(#glowBase)" stroke="#fadd7d" stroke-width="1"/>
    <path d="M265,100 L265,115 M275,100 L275,115 M285,100 L285,115 M295,100 L295,115 M305,100 L305,115 M315,100 L315,115 M325,100 L325,115 M335,100 L335,115 M345,100 L345,115 M355,100 L355,115" stroke="#ffffff" stroke-width="2"/>
    <path d="M260,105 L365,105 M260,110 L365,110" stroke="#ffffff" stroke-width="2"/>

    <!-- Central Om Plate -->
    <rect x="150" y="90" width="100" height="35" rx="3" fill="url(#whiteBase)" stroke="#e0e0e0" stroke-width="2" filter="drop-shadow(0px 2px 2px rgba(0,0,0,0.1))"/>
    <rect x="160" y="95" width="80" height="25" rx="2" fill="#ffffff" stroke="#dcdcdc" stroke-width="1.5"/>
    <text x="200" y="115" text-anchor="middle" font-size="22" fill="#aaaaaa" font-family="serif">ॐ</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Simple gold vanity shelf -->
  <rect x="10" y="40" width="380" height="20" rx="4" fill="url(#vanityGold1)" stroke="#8b5e1a" stroke-width="2"/>
  <!-- Legs -->
  <rect x="30" y="60" width="20" height="55" rx="4" fill="url(#legGold)" stroke="#8b5e1a" stroke-width="1.5"/>
  <rect x="175" y="60" width="20" height="55" rx="4" fill="url(#legGold)" stroke="#8b5e1a" stroke-width="1.5"/>
  <rect x="350" y="60" width="20" height="55" rx="4" fill="url(#legGold)" stroke="#8b5e1a" stroke-width="1.5"/>
  <!-- Decorative apron -->
  <path d="M50,60 Q90,80 130,60 Q170,80 225,60 Q265,80 305,60 Q340,80 350,60" fill="none" stroke="#8b5e1a" stroke-width="1.5"/>
  <!-- Top surface texture -->
  <rect x="10" y="34" width="380" height="8" rx="3" fill="#d4a017" stroke="#8b5e1a" stroke-width="1.5"/>
  <!-- Decorative panel behind -->
  <rect x="10" y="5" width="380" height="36" rx="4" fill="url(#backTopGold)" stroke="#8b5e1a" stroke-width="2"/>
  <!-- Arch cutout in panel -->
  <path d="M80,5 Q80,30 130,30 Q180,30 180,5" fill="#fffbe8" stroke="#8b5e1a" stroke-width="1.5"/>
  <path d="M170,5 Q170,38 220,38 Q270,38 270,5" fill="#fffbe8" stroke="#8b5e1a" stroke-width="2"/>
  <path d="M220,5 Q220,30 270,30 Q320,30 320,5" fill="#fffbe8" stroke="#8b5e1a" stroke-width="1.5"/>
  <defs>
    <linearGradient id="vanityGold1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d06e"/>
      <stop offset="100%" stop-color="#c8a44a"/>
    </linearGradient>
    <linearGradient id="legGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a44a"/>
      <stop offset="50%" stop-color="#f5d06e"/>
      <stop offset="100%" stop-color="#c8a44a"/>
    </linearGradient>
    <linearGradient id="backTopGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c060"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
  </defs>
</svg>

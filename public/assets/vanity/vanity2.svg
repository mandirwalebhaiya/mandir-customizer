<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="corianVanity2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#fdfdfd"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="corianShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
  </defs>

  <!-- Vanity base / Top shelf -->
  <rect x="20" y="30" width="360" height="20" rx="3" fill="url(#corianVanity2)" stroke="#cccccc" stroke-width="1.5"/>
  <rect x="15" y="50" width="370" height="8" rx="2" fill="url(#corianShadow)" stroke="#cccccc" stroke-width="1.5"/>

  <!-- Main Drawer Body -->
  <rect x="25" y="58" width="350" height="40" rx="2" fill="url(#corianVanity2)" stroke="#cccccc" stroke-width="1.5"/>

  <!-- 3 Drawers -->
  <!-- Left Drawer -->
  <rect x="35" y="65" width="100" height="25" rx="3" fill="#ffffff" stroke="#dcdcdc" stroke-width="1.5"/>
  <!-- Jali/Carving on Drawer -->
  <path d="M45,70 L45,85 M55,70 L55,85 M65,70 L65,85 M115,70 L115,85 M125,70 L125,85" stroke="#f0f0f0" stroke-width="1.5"/>
  <circle cx="85" cy="77.5" r="4" fill="#e0e0e0" stroke="#cccccc" stroke-width="1"/>

  <!-- Center Drawer with Om -->
  <rect x="150" y="65" width="100" height="25" rx="3" fill="#ffffff" stroke="#dcdcdc" stroke-width="1.5"/>
  <text x="200" y="82" text-anchor="middle" font-size="20" fill="#c0c0c0" font-family="serif">ॐ</text>

  <!-- Right Drawer -->
  <rect x="265" y="65" width="100" height="25" rx="3" fill="#ffffff" stroke="#dcdcdc" stroke-width="1.5"/>
  <!-- Jali/Carving on Drawer -->
  <path d="M275,70 L275,85 M285,70 L285,85 M335,70 L335,85 M345,70 L345,85 M355,70 L355,85" stroke="#f0f0f0" stroke-width="1.5"/>
  <circle cx="315" cy="77.5" r="4" fill="#e0e0e0" stroke="#cccccc" stroke-width="1"/>

  <!-- Legs -->
  <rect x="35" y="98" width="15" height="15" rx="2" fill="url(#corianShadow)" stroke="#cccccc" stroke-width="1.5"/>
  <rect x="192" y="98" width="15" height="15" rx="2" fill="url(#corianShadow)" stroke="#cccccc" stroke-width="1.5"/>
  <rect x="350" y="98" width="15" height="15" rx="2" fill="url(#corianShadow)" stroke="#cccccc" stroke-width="1.5"/>

  <!-- Back Trim (small upward trim at the very back) -->
  <rect x="25" y="15" width="350" height="15" rx="2" fill="url(#corianVanity2)" stroke="#cccccc" stroke-width="1.5"/>
  
  <!-- Back Trim Decorative Grooves -->
  <line x1="30" y1="20" x2="370" y2="20" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="30" y1="25" x2="370" y2="25" stroke="#e0e0e0" stroke-width="1"/>
</svg>

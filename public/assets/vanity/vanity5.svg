<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Ornate carved platform -->
  <!-- Top surface -->
  <rect x="5" y="20" width="390" height="18" rx="5" fill="url(#platTop)" stroke="#8b5e1a" stroke-width="2.5"/>
  <!-- Base body -->
  <rect x="15" y="38" width="370" height="72" rx="5" fill="url(#platBase)" stroke="#8b5e1a" stroke-width="2"/>
  <!-- Carved panels -->
  <rect x="25" y="48" width="80" height="50" rx="4" fill="#d4a017" stroke="#8b5e1a" stroke-width="1.5" opacity="0.6"/>
  <rect x="115" y="48" width="70" height="50" rx="4" fill="#d4a017" stroke="#8b5e1a" stroke-width="1.5" opacity="0.6"/>
  <rect x="195" y="44" width="90" height="56" rx="4" fill="#d4a017" stroke="#8b5e1a" stroke-width="1.5" opacity="0.7"/>
  <rect x="295" y="48" width="70" height="50" rx="4" fill="#d4a017" stroke="#8b5e1a" stroke-width="1.5" opacity="0.6"/>
  <!-- Center Om -->
  <text x="240" y="78" text-anchor="middle" font-size="28" fill="#8b5e1a" font-family="serif">ॐ</text>
  <!-- Lotus icons in side panels -->
  <circle cx="65" cy="73" r="15" fill="#f5d06e" stroke="#8b5e1a" stroke-width="1" opacity="0.7"/>
  <circle cx="150" cy="73" r="12" fill="#f5d06e" stroke="#8b5e1a" stroke-width="1" opacity="0.7"/>
  <circle cx="330" cy="73" r="12" fill="#f5d06e" stroke="#8b5e1a" stroke-width="1" opacity="0.7"/>
  <!-- Feet bumps -->
  <ellipse cx="40" cy="110" rx="15" ry="5" fill="#b8840a" stroke="#8b5e1a" stroke-width="1"/>
  <ellipse cx="200" cy="110" rx="15" ry="5" fill="#b8840a" stroke="#8b5e1a" stroke-width="1"/>
  <ellipse cx="360" cy="110" rx="15" ry="5" fill="#b8840a" stroke="#8b5e1a" stroke-width="1"/>
  <defs>
    <linearGradient id="platTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d06e"/>
      <stop offset="100%" stop-color="#c8a44a"/>
    </linearGradient>
    <linearGradient id="platBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#a07010"/>
    </linearGradient>
  </defs>
</svg>
